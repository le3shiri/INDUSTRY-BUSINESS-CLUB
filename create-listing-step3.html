<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence - Specs</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/wizard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/components.js"></script>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between;">
                <h1 style="font-size: 1.75rem; font-weight: 800; margin: 0;">Create New Listing</h1>
                <a href="dashboard.html" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">
                    <i class="fas fa-times" style="margin-right: 0.5rem;"></i> Cancel
                </a>
            </header>

            <div class="wizard-container fade-in-up">

                <div class="wizard-progress">
                    <div class="wizard-bar-bg">
                        <div class="wizard-bar-fill" style="width: 75%;"></div>
                    </div>
                    <div class="wizard-steps">
                        <div class="step-item completed">
                            <div class="step-indicator-circle">✓</div>
                            <span class="step-label">Details</span>
                        </div>
                        <div class="step-item completed">
                            <div class="step-indicator-circle">✓</div>
                            <span class="step-label">Photos</span>
                        </div>
                        <div class="step-item active">
                            <div class="step-indicator-circle">3</div>
                            <span class="step-label">Specs</span>
                        </div>
                        <div class="step-item">
                            <div class="step-indicator-circle">4</div>
                            <span class="step-label">Price</span>
                        </div>
                    </div>
                </div>

                <div class="shadow-box" style="padding: 2.5rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; color: var(--primary-color);">
                        3. Logistique</h2>

                    <!-- SECTION 5 : Logistique -->
                    <div
                        style="background: #eff6ff; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid #2563eb;">
                        <h3 style="font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: #1e40af;">Section 5:
                            Logistique</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label class="form-label">Localisation du stock *</label>
                                <input type="text" id="warehouse_location" class="form-input"
                                    placeholder="Ville, Zone Industrielle...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Conditions de stockage</label>
                                <input type="text" id="storage_conditions" class="form-input"
                                    placeholder="Ex: Température ambiante, Sec, Sous abri...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Incoterm proposé *</label>
                                <select id="incoterm" class="form-input">
                                    <option value="EXW">EXW (À l'usine)</option>
                                    <option value="FOB">FOB (Franco à bord)</option>
                                    <option value="CIF">CIF (Coût, Assurance et Frêt)</option>
                                    <option value="DDP">DDP (Rendu droits acquittés)</option>
                                    <option value="Autre">Autre</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Mode de livraison possible</label>
                                <input type="text" id="delivery_mode" class="form-input"
                                    placeholder="Ex: Camion, Container, Enlèvement client...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Délais de mise à disposition *</label>
                                <input type="text" id="lead_time" class="form-input"
                                    placeholder="Ex: Immédiat, 48h, 1 semaine...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Possibilité d’inspection sur place ?</label>
                                <select id="inspection_possible" class="form-input">
                                    <option value="Oui">Oui</option>
                                    <option value="Non">Non</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6"
                        style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                        <a href="create-listing-step2.html" class="btn btn-secondary" style="width: auto;">
                            <i class="fas fa-arrow-left"></i> Retour
                        </a>
                        <button class="btn btn-primary" id="next-step-3" style="width: auto; min-width: 150px;">
                            Suivant: Paiement & Validation <i class="fas fa-arrow-right"
                                style="margin-left: 0.5rem;"></i>
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        function selectCondition(el, val) {
            document.querySelectorAll('.condition-option').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('condition').value = val;
        }

        function showFileName(input) {
            const display = document.getElementById('file-name');
            if (input.files && input.files[0]) {
                display.style.display = 'block';
                display.innerText = input.files[0].name;
            }
        }

        document.getElementById('next-step-3').addEventListener('click', () => {
            const step3Data = {
                warehouse_location: document.getElementById('warehouse_location').value,
                storage_conditions: document.getElementById('storage_conditions').value,
                incoterm: document.getElementById('incoterm').value,
                delivery_mode: document.getElementById('delivery_mode').value,
                lead_time: document.getElementById('lead_time').value,
                inspection_possible: document.getElementById('inspection_possible').value
            };

            if (step3Data.warehouse_location && step3Data.incoterm && step3Data.lead_time) {
                const listing = JSON.parse(localStorage.getItem('temp_listing') || '{}');
                listing.step3 = step3Data;
                localStorage.setItem('temp_listing', JSON.stringify(listing));
                window.location.href = 'create-listing-step4.html';
            } else {
                alert("Veuillez remplir les informations logistiques obligatoires.");
            }
        });
    </script>
</body>

</html>
