<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence Admin | Offres Acceptées</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/components.js"></script>
    <script src="js/admin-data.js"></script>

    <style>
        :root {
            --admin-bg: #fcfcfd;
            --card-border: #eaecf0;
            --text-main: #101828;
            --text-sub: #475467;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --primary-corporate: #101828;
            --success-main: #027a48;
            --success-bg: #ecfdf3;
            --warning-main: #b54708;
            --warning-bg: #fffaeb;
            --danger-main: #b42318;
            --danger-bg: #fef3f2;
            --info-main: #026aa2;
            --info-bg: #f0f9ff;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--admin-bg);
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .main-content {
            padding: 0;
            background: var(--admin-bg);
        }

        .top-nav {
            background: white;
            border-bottom: 1px solid var(--card-border);
            padding: 1.25rem 2.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-container {
            padding: 2.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Filter Section */
        .filter-bar {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr) auto;
            gap: 1rem;
            align-items: flex-end;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.05);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .filter-control {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text-main);
            background: #fff;
        }

        /* High-Density Data Table */
        .table-outer {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.05);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        .admin-table th {
            background: #f9fafb;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--card-border);
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.85rem;
            vertical-align: middle;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success-main);
        }

        .badge-warning {
            background: var(--warning-bg);
            color: var(--warning-main);
        }

        .badge-info {
            background: var(--info-bg);
            color: var(--info-main);
        }

        .action-btns {
            display: flex;
            gap: 0.4rem;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: white;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-icon:hover {
            border-color: var(--text-main);
            color: var(--text-main);
            background: #f9fafb;
        }

        .id-link {
            color: var(--info-main);
            font-weight: 700;
            cursor: pointer;
            border-bottom: 1px dashed transparent;
        }

        .id-link:hover {
            border-bottom-color: var(--info-main);
        }

        .id-badge {
            font-family: monospace;
            font-size: 0.7rem;
            background: #f2f4f7;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h1 style="margin:0; font-size: 1.5rem; font-weight: 700;">Offres Acceptées</h1>
                    <p style="margin:0; font-size: 0.85rem; color: var(--text-sub);">Suivi des conversions commerciales
                        et transition vers l'exécution transactionnelle</p>
                </div>
                <div style="display: flex; gap: 0.75rem;">
                    <button class="btn btn-secondary" style="background: white;"><i class="fas fa-file-export"></i>
                        Exporter Acceptations</button>
                    <button class="btn btn-primary"><i class="fas fa-sync"></i> Actualiser</button>
                </div>
            </header>

            <div class="dashboard-container">

                <!-- Filters -->
                <div class="filter-bar">
                    <div class="filter-group">
                        <label class="filter-label">Recherche</label>
                        <input type="text" class="filter-control" placeholder="ID Offre, Deal, Acteur...">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Statut Workflow</label>
                        <select class="filter-control">
                            <option selected>Tous les statuts</option>
                            <option>En attente paiement</option>
                            <option>Paiement confirmé</option>
                            <option>Deal créé</option>
                            <option>Transaction en cours</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Catégorie</label>
                        <select class="filter-control">
                            <option selected>Toutes catégories</option>
                            <option>Matières Premières</option>
                            <option>Machines Industrielles</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Période</label>
                        <select class="filter-control">
                            <option selected>Derniers 30 jours</option>
                            <option>Mois précédent</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Action</label>
                        <button class="btn btn-primary" style="padding: 10px 20px;"><i
                                class="fas fa-search"></i></button>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="table-outer">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>IDs (Offre/Post)</th>
                                <th>Désignation & Catégorie</th>
                                <th>Portefeuille Acteurs (A/V)</th>
                                <th>Détails Accord (Qté/Prix)</th>
                                <th>Montant Total (MAD)</th>
                                <th>Workflow Status</th>
                                <th>Réf Deal Associé</th>
                                <th>Timeline (Envoi/Accept)</th>
                                <th style="text-align: right;">Actions Régie</th>
                            </tr>
                        </thead>
                        <tbody id="accepted-offers-body">
                            <!-- Data injection -->
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Components.renderAdminSidebar('admin-offers-accepted.html');

            const acceptedOffers = [
                {
                    id: 'OFF-7721', postId: 'ADS-9912', product: 'Charbon Industriel Grade A', category: 'Matières P.',
                    buyer: 'Sara Benani', buyerCompany: 'Benani Logistics',
                    seller: 'Ahmed Mansouri', sellerCompany: 'Atlas Mining',
                    qty: 50, 單位: 'tonnes', price: 1100, total: 55000,
                    status: 'paiement confirmé', dealId: 'DEAL-445',
                    dateSent: '01/03/2026', dateAccept: '02/03/2026'
                },
                {
                    id: 'OFF-7710', postId: 'ADS-9850', product: 'Compresseur ATLAS GX-7', category: 'Machines',
                    buyer: 'Youssef El Fassi', buyerCompany: 'Fassi Industrial',
                    seller: 'Mehdi Tazi', sellerCompany: 'Tazi Industrial',
                    qty: 1, 單位: 'unité', price: 15400, total: 15400,
                    status: 'en attente paiement', dealId: 'DEAL-442',
                    dateSent: '28/02/2026', dateAccept: '01/03/2026'
                },
                {
                    id: 'OFF-7705', postId: 'ADS-9740', product: 'Acier Allié (Poutrelles)', category: 'Matières P.',
                    buyer: 'Karim Mansour', buyerCompany: 'Mansour Steel',
                    seller: 'Samir El Masri', sellerCompany: 'Egyptian Steel',
                    qty: 100, 單位: 'poutres', price: 4200, total: 420000,
                    status: 'transaction en cours', dealId: 'DEAL-430',
                    dateSent: '25/02/2026', dateAccept: '27/02/2026'
                },
                {
                    id: 'OFF-7695', postId: 'ADS-9620', product: 'Moteurs Triphasés 15kW', category: 'Électronique',
                    buyer: 'Amel Tounsi', buyerCompany: 'Tunisia Fab',
                    seller: 'Khalid Alami', sellerCompany: 'Alami Tech',
                    qty: 5, 單位: 'unités', price: 7900, total: 39500,
                    status: 'deal créé', dealId: 'DEAL-428',
                    dateSent: '20/02/2026', dateAccept: '22/02/2026'
                }
            ];

            const tbody = document.getElementById('accepted-offers-body');

            function renderAccepted(list) {
                tbody.innerHTML = list.map(o => `
                    <tr>
                        <td>
                            <div class="id-badge">OFF: ${o.id}</div>
                            <div class="id-badge" style="margin-top:4px; opacity:0.7">ADS: ${o.postId}</div>
                        </td>
                        <td>
                            <div style="font-weight: 700;">${o.product}</div>
                            <div style="font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; font-weight: 800;">${o.category}</div>
                        </td>
                        <td>
                            <div style="font-weight: 700; font-size: 0.85rem;">A: ${o.buyerCompany}</div>
                            <div style="font-size: 0.75rem; color: var(--text-sub);">V: ${o.sellerCompany}</div>
                        </td>
                        <td>
                            <div style="font-weight: 800;">${o.qty} ${o.單位}</div>
                            <div style="font-size: 0.7rem; color: var(--text-sub);">Fixé à ${o.price.toLocaleString()} MAD</div>
                        </td>
                        <td style="font-weight: 800; color: var(--text-main);">${o.total.toLocaleString()} MAD</td>
                        <td>
                            <span class="badge ${getStatusBadge(o.status)}">
                                ${o.status}
                            </span>
                        </td>
                        <td>
                            <span class="id-link"><i class="fas fa-handshake"></i> ${o.dealId}</span>
                        </td>
                        <td>
                            <div style="font-size: 0.7rem;">Envoi: <b>${o.dateSent}</b></div>
                            <div style="font-size: 0.7rem; color: var(--success-main);">Accord: ${o.dateAccept}</div>
                        </td>
                        <td style="text-align: right;">
                            <div class="action-btns" style="justify-content: flex-end;">
                                <button class="btn-icon" title="Voir offre"><i class="fas fa-eye"></i></button>
                                <button class="btn-icon" title="Voir Deal"><i class="fas fa-file-contract"></i></button>
                                <button class="btn-icon" title="Audit Transaction"><i class="fas fa-exchange-alt"></i></button>
                                <button class="btn-icon" title="Profils"><i class="fas fa-user-friends"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            function getStatusBadge(status) {
                switch (status) {
                    case 'paiement confirmé': return 'badge-success';
                    case 'transaction en cours': return 'badge-info';
                    case 'en attente paiement': return 'badge-warning';
                    case 'deal créé': return 'badge-info';
                    default: return '';
                }
            }

            renderAccepted(acceptedOffers);
        });
    </script>
</body>

</html>
