<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence Admin | Activité Récente</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/components.js"></script>
    <script src="js/admin-data.js"></script>

    <style>
        :root {
            --admin-bg: #fcfcfd;
            --card-border: #eaecf0;
            --text-main: #101828;
            --text-sub: #475467;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--admin-bg);
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .main-content {
            padding: 0;
            background: var(--admin-bg);
        }

        .top-nav {
            background: white;
            border-bottom: 1px solid var(--card-border);
            padding: 1.25rem 2.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-container {
            padding: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Activity Timeline Styles */
        .timeline {
            position: relative;
            padding-left: 2.5rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0.75rem;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--card-border);
        }

        .activity-group {
            margin-bottom: 3rem;
            position: relative;
        }

        .group-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            background: var(--admin-bg);
            display: inline-block;
            padding-right: 1rem;
        }

        .activity-card {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
            position: relative;
            transition: all 0.2s;
        }

        .activity-card:hover {
            border-color: var(--text-main);
            box-shadow: 0 4px 12px rgba(16, 24, 40, 0.04);
        }

        .activity-card::before {
            content: '';
            position: absolute;
            left: -2.3rem;
            top: 1.5rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--card-border);
            z-index: 1;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .icon-user {
            background: #f0f9ff;
            color: #026aa2;
        }

        .icon-company {
            background: #fdf2fa;
            color: #c11574;
        }

        .icon-ad {
            background: #fef6ee;
            color: #b93815;
        }

        .icon-deal {
            background: #f5f3ff;
            color: #5925dc;
        }

        .icon-payment {
            background: #ecfdf3;
            color: #027a48;
        }

        .icon-logistics {
            background: #fff1f3;
            color: #c01048;
        }

        .icon-alert {
            background: #fff1f0;
            color: #b42318;
        }

        .activity-details {
            flex: 1;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .activity-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin: 0;
        }

        .activity-time {
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .activity-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin: 0;
            line-height: 1.5;
        }

        .activity-meta {
            margin-top: 0.75rem;
            display: flex;
            gap: 1rem;
        }

        .meta-tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tag-success {
            background: #ecfdf3;
            color: #027a48;
        }

        .tag-warning {
            background: #fffaeb;
            color: #b54708;
        }

        .tag-error {
            background: #fef3f2;
            color: #b42318;
        }

        .tag-neutral {
            background: #f2f4f7;
            color: #344054;
        }

        /* Filter Pills */
        .filter-scroll {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            scrollbar-width: none;
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .filter-pill {
            padding: 0.5rem 1.25rem;
            border: 1px solid var(--card-border);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .filter-pill.active {
            background: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h1 style="margin:0; font-size: 1.5rem; font-weight: 700;">Journal d'Activité Récente</h1>
                    <p style="margin:0; font-size: 0.85rem; color: var(--text-sub);">Suivi temps réel des événements
                        Fluxence</p>
                </div>
            </header>

            <div class="dashboard-container">

                <!-- Activity Category Filters -->
                <div class="filter-scroll">
                    <div class="filter-pill active">Tout</div>
                    <div class="filter-pill">Utilisateurs & Entreprises</div>
                    <div class="filter-pill">Annonces & Stocks</div>
                    <div class="filter-pill">Deals & Offres</div>
                    <div class="filter-pill">Flux Financiers</div>
                    <div class="filter-pill">Logistique</div>
                    <div class="filter-pill">Modération & Sécurité</div>
                </div>

                <div class="timeline" id="activity-timeline">
                    <!-- Activities will be injected here -->
                </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Components.renderAdminSidebar('admin-activity.html');

            const timeline = document.getElementById('activity-timeline');

            // List of activities requested by the user
            const rawActivities = [
                // 1. Users & Companies
                { category: 'user', icon: 'fa-user-plus', title: 'Nouvel utilisateur inscrit', desc: 'M. Ahmed Saidi a rejoint la plateforme.', time: 'À l\'instant', tag: 'Success', status: 'success' },
                { category: 'company', icon: 'fa-building', title: 'Nouvelle entreprise enregistrée', desc: 'Atlas Concrete SARL a soumis son dossier.', time: 'Il y a 10 min', tag: 'Dossier Reçu', status: 'neutral' },
                { category: 'user', icon: 'fa-user-check', title: 'Compte vérifié (KYC)', desc: 'Vérification terminée pour BuildIt SA.', time: 'Il y a 25 min', tag: 'Vérifié', status: 'success' },

                // 2. Ads & Stocks
                { category: 'ad', icon: 'fa-bullhorn', title: 'Nouvelle annonce publiée', desc: 'Stock de 500T Ciment CPJ45 par Safi Cement.', time: 'Il y a 45 min', tag: 'Nouveau', status: 'neutral' },
                { category: 'ad', icon: 'fa-clock', title: 'Annonce en attente de validation', desc: 'Fer à béton 12mm - 5 tonnes (Needs review).', time: 'Il y a 1h', tag: 'Action Requise', status: 'warning' },
                { category: 'ad', icon: 'fa-check-double', title: 'Annonce approuvée', desc: 'Lot de Cuivre Millberry par Mining Corp.', time: 'Il y a 2h', tag: 'Actif', status: 'success' },
                { category: 'ad', icon: 'fa-times-circle', title: 'Annonce refusée', desc: 'Matériel non conforme détecté (Audit: ID-942).', time: 'Il y a 3h', tag: 'Refusé', status: 'error' },

                // 3. Offers & Deals
                { category: 'deal', icon: 'fa-file-invoice-dollar', title: 'Nouvelle offre d\'achat envoyée', desc: 'Offre reçue pour le lot de Cuivre (82k MAD).', time: 'Il y a 4h', tag: 'Offre reçue', status: 'neutral' },
                { category: 'deal', icon: 'fa-file-signature', title: 'Offre acceptée', desc: 'Le vendeur Safi Cement a accepté l\'offre de BuildIt.', time: 'Il y a 5h', tag: 'Accepté', status: 'success' },
                { category: 'deal', icon: 'fa-handshake-slash', title: 'Offre refusée', desc: 'Négociation échouée sur le lot de Granulat.', time: 'Il y a 6h', tag: 'Refusé', status: 'error' },
                { category: 'deal', icon: 'fa-plus-circle', title: 'Deal créé', desc: 'Deal #DL-8822 généré (Escrow initialisé).', time: 'Il y a 7h', tag: 'En cours', status: 'neutral' },
                { category: 'deal', icon: 'fa-check-circle', title: 'Deal confirmé', desc: 'Signature électronique complète pour Deal #DL-8810.', time: 'Il y a 9h', tag: 'Confirmé', status: 'success' },
                { category: 'deal', icon: 'fa-ban', title: 'Deal annulé', desc: 'Délai expiré pour le paiement Deal #DL-8790.', time: 'Il y a 12h', tag: 'Annulé', status: 'error' },

                // 4. Payments
                { category: 'payment', icon: 'fa-money-bill-wave', title: 'Paiement reçu', desc: '85,000 MAD reçu pour Deal #DL-8820.', time: 'Il y a 14h', tag: 'En Escrow', status: 'success' },
                { category: 'payment', icon: 'fa-hourglass-half', title: 'Paiement en attente', desc: 'Virement Atlas Cement en cours de traitement.', time: 'Il y a 15h', tag: 'En attente', status: 'warning' },
                { category: 'payment', icon: 'fa-exclamation-triangle', title: 'Paiement échoué', desc: 'Refus bancaire pour l\'acheteur Intech SA.', time: 'Il y a 18h', tag: 'Échec', status: 'error' },

                // 5. Logistics
                { category: 'logistics', icon: 'fa-truck-loading', title: 'Expédition déclarée', desc: 'Lot de Ciment en route (Track: #FLX94).', time: 'Il y a 20h', tag: 'En route', status: 'success' },
                { category: 'logistics', icon: 'fa-box-open', title: 'Confirmation de réception', desc: 'L\'acheteur confirme la conformité du lot #DL-8815.', time: 'Il y a 22h', tag: 'Reçu', status: 'success' },

                // 6. Withdrawals
                { category: 'payment', icon: 'fa-university', title: 'Reversement effectué', desc: 'Commission déduite. Solde versé à Safi Motors.', time: 'Hier', tag: 'Finalisé', status: 'success' },
                { category: 'payment', icon: 'fa-clock', title: 'Reversement en attente', desc: 'Validation fiscale pour reversement Mining SA.', time: 'Hier', tag: 'Attente Admin', status: 'warning' },

                // 7. Disputes & Alerts
                { category: 'alert', icon: 'fa-gavel', title: 'Litige ouvert', desc: 'Contestation sur la qualité du lot #DL-8800.', time: 'Hier', tag: 'Litige', status: 'error' },
                { category: 'alert', icon: 'fa-shield-check', title: 'Litige résolu', desc: 'Arbitrage Fluxence accepté par les deux parties.', time: 'Hier', tag: 'Clos', status: 'success' },
                { category: 'alert', icon: 'fa-flag', title: 'Annonce signalée', desc: 'Signalement pour usurpation d\'identité (Annonce #29).', time: 'Hier', tag: 'Signalement', status: 'error' },
                { category: 'alert', icon: 'fa-user-secret', title: 'Activité suspecte détectée', desc: 'Connexion inhabituelle depuis l\'étranger (User #82).', time: 'Il y a 2 jours', tag: 'Sécurité', status: 'error' }
            ];

            // Render Function
            function renderActivities(list) {
                timeline.innerHTML = `
                    <div class="activity-group">
                        <span class="group-label">Aujourd'hui / Dernières 48h</span>
                        ${list.map(act => `
                            <div class="activity-card" data-category="${act.category}">
                                <div class="activity-icon icon-${act.category}">
                                    <i class="fas ${act.icon}"></i>
                                </div>
                                <div class="activity-details">
                                    <div class="activity-header">
                                        <h4 class="activity-title">${act.title}</h4>
                                        <span class="activity-time">${act.time}</span>
                                    </div>
                                    <p class="activity-desc">${act.desc}</p>
                                    <div class="activity-meta">
                                        <span class="meta-tag tag-${act.status}">${act.tag}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            renderActivities(rawActivities);

            // Filter Logic
            document.querySelectorAll('.filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');

                    const filterText = pill.textContent.toLowerCase();
                    if (filterText === 'tout') {
                        renderActivities(rawActivities);
                    } else if (filterText.includes('utilisateurs')) {
                        renderActivities(rawActivities.filter(a => a.category === 'user' || a.category === 'company'));
                    } else if (filterText.includes('annonces')) {
                        renderActivities(rawActivities.filter(a => a.category === 'ad'));
                    } else if (filterText.includes('deals')) {
                        renderActivities(rawActivities.filter(a => a.category === 'deal'));
                    } else if (filterText.includes('financiers')) {
                        renderActivities(rawActivities.filter(a => a.category === 'payment'));
                    } else if (filterText.includes('logistique')) {
                        renderActivities(rawActivities.filter(a => a.category === 'logistics'));
                    } else if (filterText.includes('modération')) {
                        renderActivities(rawActivities.filter(a => a.category === 'alert'));
                    }
                });
            });
        });
    </script>
</body>

</html>
