<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence - Media</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/wizard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/components.js"></script>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between;">
                <h1 style="font-size: 1.75rem; font-weight: 800; margin: 0;">Create New Listing</h1>
                <a href="dashboard.html" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">
                    <i class="fas fa-times" style="margin-right: 0.5rem;"></i> Cancel
                </a>
            </header>

            <div class="wizard-container fade-in-up">

                <div class="wizard-progress">
                    <div class="wizard-bar-bg">
                        <div class="wizard-bar-fill" style="width: 50%;"></div>
                    </div>
                    <div class="wizard-steps">
                        <div class="step-item completed">
                            <div class="step-indicator-circle">✓</div>
                            <span class="step-label">Details</span>
                        </div>
                        <div class="step-item active">
                            <div class="step-indicator-circle">2</div>
                            <span class="step-label">Photos</span>
                        </div>
                        <div class="step-item">
                            <div class="step-indicator-circle">3</div>
                            <span class="step-label">Specs</span>
                        </div>
                        <div class="step-item">
                            <div class="step-indicator-circle">4</div>
                            <span class="step-label">Price</span>
                        </div>
                    </div>
                </div>

                <div class="shadow-box" style="padding: 2.5rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; color: var(--primary-color);">
                        2. Quantités, État & Médias</h2>

                    <!-- SECTION 3 : Données quantitatives -->
                    <div
                        style="background: #f0fdf4; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid var(--success-color);">
                        <h3 style="font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: #166534;">Section 3:
                            Données Quantitatives</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Quantité disponible *</label>
                                <input type="number" id="quantity" class="form-input" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Unité *</label>
                                <select id="unit" class="form-input">
                                    <option value="kg">kilogramme (kg)</option>
                                    <option value="tonne">tonne</option>
                                    <option value="palette">palette</option>
                                    <option value="piece">pièce</option>
                                    <option value="lot">lot</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Min. Commande (MOQ) *</label>
                                <input type="number" id="moq" class="form-input" placeholder="1">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Prix unitaire (MAD) *</label>
                                <input type="number" id="price" class="form-input" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Prix négociable ?</label>
                                <select id="negotiable" class="form-input">
                                    <option value="Oui">Oui</option>
                                    <option value="Non">Non</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Remise Volume ?</label>
                                <select id="volume_discount" class="form-input">
                                    <option value="Non">Non</option>
                                    <option value="Oui">Oui</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 4 : État & conformité -->
                    <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem;">Section 4: État & Conformité
                    </h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">État de l'article *</label>
                            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                    <input type="radio" name="condition" value="Neuf" checked> Neuf
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                    <input type="radio" name="condition" value="Surplus"> Surplus
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                    <input type="radio" name="condition" value="Reconditionné"> Reconditionné
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                    <input type="radio" name="condition" value="Occasion"> Occasion
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Certifications (CE, ISO, ...) *</label>
                            <input type="text" id="certifications" class="form-input" placeholder="Ex: ISO 9001, CE">
                        </div>
                    </div>

                    <div class="form-group mb-6">
                        <label class="form-label">Photos obligatoires (Min. 3) *</label>
                        <div class="image-upload-zone" id="drop-area" style="border-style: dashed; padding: 2rem;">
                            <input type="file" id="fileElem" multiple accept="image/*" style="display:none"
                                onchange="handleFiles(this.files)">
                            <i class="fas fa-camera"
                                style="font-size: 2rem; color: var(--primary-color); margin-bottom: 0.5rem;"></i>
                            <p style="font-size: 0.95rem; font-weight: 600; margin: 0;">Ajouter des photos</p>
                            <p style="font-size: 0.8rem; color: var(--text-secondary);">Indispensable pour la validation
                                admin</p>
                        </div>
                        <div class="preview-grid" id="gallery" style="margin-top: 1rem;"></div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Fiche technique (PDF/Image)</label>
                            <input type="file" id="spec_sheet" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Lien Vidéo (Optionnel)</label>
                            <input type="url" id="video_url" class="form-input" placeholder="YouTube, Vimeo, Cloud...">
                        </div>
                    </div>

                    <div class="mt-6"
                        style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                        <a href="create-listing-step1.html" class="btn btn-secondary" style="width: auto;">
                            <i class="fas fa-arrow-left"></i> Retour
                        </a>
                        <button class="btn btn-primary" id="next-step-2" style="width: auto; min-width: 150px;">
                            Suivant: Logistique <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Image Handling Logic
        let files = [];
        const dropArea = document.getElementById('drop-area');

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) { dropArea.classList.add('dragover'); }
        function unhighlight(e) { dropArea.classList.remove('dragover'); }

        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const newFiles = dt.files;
            handleFiles(newFiles);
        }

        dropArea.addEventListener('click', () => document.getElementById('fileElem').click());

        function handleFiles(newFiles) {
            ([...newFiles]).forEach(previewFile);
        }

        function previewFile(file) {
            // In prototype, we just read as DataURL to show preview
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = function () {
                const img = document.createElement('div');
                img.className = 'preview-item';
                img.innerHTML = `
            <img src="${reader.result}" class="preview-img">
            <button class="remove-btn" onclick="this.parentElement.remove()">X</button>
          `;
                document.getElementById('gallery').appendChild(img);
            }
        }

        // Next
        document.getElementById('next-step-2').addEventListener('click', () => {
            const step2Data = {
                quantity: document.getElementById('quantity').value,
                unit: document.getElementById('unit').value,
                moq: document.getElementById('moq').value,
                price: document.getElementById('price').value,
                negotiable: document.getElementById('negotiable').value,
                volume_discount: document.getElementById('volume_discount').value,
                condition: document.querySelector('input[name="condition"]:checked').value,
                certifications: document.getElementById('certifications').value,
                video_url: document.getElementById('video_url').value
            };

            // Basic validation
            if (step2Data.quantity && step2Data.price) {
                const listing = JSON.parse(localStorage.getItem('temp_listing') || '{}');
                listing.step2 = step2Data;
                localStorage.setItem('temp_listing', JSON.stringify(listing));
                window.location.href = 'create-listing-step3.html';
            } else {
                alert("Veuillez remplir les informations de quantité et de prix.");
            }
        });
    </script>
</body>

</html>
