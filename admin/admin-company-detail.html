<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile | IBC Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../js/components.js"></script>
    <script src="../js/admin-data.js"></script>
    <style>
        .profile-header {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-top: 0.5rem;
        }

        .section-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            height: 100%;
        }
    </style>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="admin-companies.html" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">
                        <i class="fas fa-arrow-left"></i> Back to Directory
                    </a>
                    <h1 style="font-size: 1.25rem; font-weight: 800; margin: 0;">Company 360° Profile</h1>
                </div>
                <div class="nav-actions">
                    <button class="btn btn-secondary" style="width: auto;"><i class="fas fa-envelope"></i> Contact
                        Owner</button>
                    <button class="btn btn-primary" style="width: auto;"><i class="fas fa-edit"></i> Edit
                        Entity</button>
                </div>
            </header>

            <div id="loading-state" style="padding: 5rem; text-align: center;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
            </div>

            <div id="profile-content" style="display: none;">
                <!-- Header Stats -->
                <div class="profile-header">
                    <div style="display: flex; align-items: center; gap: 1.5rem;">
                        <div
                            style="width: 80px; height: 80px; background: var(--admin-accent-light); border-radius: 16px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-building" style="font-size: 2rem; color: var(--primary-color);"></i>
                        </div>
                        <div>
                            <h2 id="comp-name" style="font-size: 2rem; font-weight: 800; margin: 0;"></h2>
                            <p id="comp-industry" class="text-secondary" style="font-size: 1.1rem; margin: 0.25rem 0;">
                            </p>
                            <span id="comp-status" class="status-badge"></span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.25rem;">ICE Number
                        </div>
                        <div id="comp-ice" style="font-size: 1.25rem; font-weight: 700;"></div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
                    <div class="stat-card">
                        <small class="text-secondary">Chiffre d'Affaires</small>
                        <div id="stat-revenue" class="stat-value">0 MAD</div>
                    </div>
                    <div class="stat-card">
                        <small class="text-secondary">Deals Conclus</small>
                        <div id="stat-deals" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <small class="text-secondary">Membre depuis</small>
                        <div id="stat-joined" class="stat-value" style="font-size: 1.2rem; color: var(--text-primary);">
                            --</div>
                    </div>
                    <div class="stat-card">
                        <small class="text-secondary">Score de Confiance</small>
                        <div class="stat-value" style="color: var(--success-color);">98%</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 400px; gap: 2rem;">
                    <!-- Left: Transactions -->
                    <div class="section-card">
                        <h3
                            style="font-size: 1.25rem; font-weight: 800; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                            <i class="fas fa-exchange-alt" style="color: var(--primary-color);"></i> Transaction History
                        </h3>
                        <div id="tx-list" style="display: flex; flex-direction: column; gap: 1rem;">
                            <!-- Deals -->
                        </div>
                    </div>

                    <!-- Right: Team & Identity -->
                    <div style="display: flex; flex-direction: column; gap: 2rem;">
                        <div class="section-card">
                            <h3
                                style="font-size: 1.1rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                                <i class="fas fa-users" style="color: var(--primary-color);"></i> Team Members
                            </h3>
                            <div id="team-list" style="display: flex; flex-direction: column; gap: 1rem;">
                                <!-- Users -->
                            </div>
                        </div>

                        <div class="section-card"
                            style="background: var(--admin-accent-light); border-color: var(--admin-accent);">
                            <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem;">Platform Actions</h3>
                            <p class="text-secondary" style="font-size: 0.85rem; margin-bottom: 1.5rem;">Administrative
                                controls for this corporate entity.</p>
                            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                <button class="btn btn-secondary" style="background: white;"><i
                                        class="fas fa-file-invoice-dollar"></i> View Billing</button>
                                <button class="btn btn-secondary" style="background: white;"><i
                                        class="fas fa-history"></i> Audit Logs</button>
                                <button class="btn btn-secondary"
                                    style="background: white; color: var(--error-color); border-color: var(--error-color);">
                                    <i class="fas fa-user-slash"></i> Terminate Account
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const companyId = params.get('id');

            if (!companyId) {
                window.location.href = 'admin-companies.html';
                return;
            }

            loadCompanyProfile(companyId);
        });

        function loadCompanyProfile(id) {
            const companies = AdminData.getData(AdminData.KEYS.COMPANIES);
            const company = companies.find(c => c.id == id);

            if (!company) {
                alert('Company not found');
                window.location.href = 'admin-companies.html';
                return;
            }

            // Fetch Related Data
            const deals = AdminData.getData(AdminData.KEYS.DEALS);
            const users = AdminData.getData(AdminData.KEYS.USERS);

            // Calculate Stats
            const sales = deals.filter(d => d.seller === company.name && d.status === 'verified');
            const totalRevenue = sales.reduce((acc, d) => acc + (parseInt(d.value.replace(/[^0-9]/g, '')) || 0), 0);
            const totalDeals = deals.filter(d => d.buyer === company.name || d.seller === company.name).length;

            // Update DOM
            document.getElementById('comp-name').textContent = company.name;
            document.getElementById('comp-industry').textContent = company.industry;
            document.getElementById('comp-ice').textContent = company.ice;
            document.getElementById('comp-status').textContent = company.status.toUpperCase();
            document.getElementById('comp-status').className = `status-badge status-${company.status}`;

            document.getElementById('stat-revenue').textContent = totalRevenue.toLocaleString() + ' MAD';
            document.getElementById('stat-deals').textContent = totalDeals;
            document.getElementById('stat-joined').textContent = company.joined;

            // Render Team
            const team = users.filter(u => u.company === company.name);
            const teamContainer = document.getElementById('team-list');
            if (team.length > 0) {
                teamContainer.innerHTML = team.map(u => `
                    <div style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: #f8fafc; border-radius: 10px; border: 1px solid var(--border-light);">
                        <div style="width: 40px; height: 40px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
                            ${u.name.charAt(0)}
                        </div>
                        <div>
                            <div style="font-weight: 700;">${u.name}</div>
                            <small class="text-secondary">${u.role}</small>
                        </div>
                    </div>
                `).join('');
            } else {
                teamContainer.innerHTML = '<p class="text-secondary" style="font-style: italic;">No team members registered.</p>';
            }

            // Render Transactions
            const companyDeals = deals.filter(d => d.buyer === company.name || d.seller === company.name);
            const txContainer = document.getElementById('tx-list');
            if (companyDeals.length > 0) {
                txContainer.innerHTML = companyDeals.map(d => `
                    <div style="padding: 1.25rem; background: white; border: 1px solid var(--border-color); border-radius: 12px; border-left: 5px solid ${d.status === 'verified' ? 'var(--success-color)' : 'var(--primary-color)'};">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span style="font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em;">
                                ${d.buyer === company.name ? 'Platform Purchase' : 'Platform Sale'}
                            </span>
                            <span class="status-badge status-${d.status}">${d.status}</span>
                        </div>
                        <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text-primary);">${d.title}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                                <i class="fas ${d.buyer === company.name ? 'fa-arrow-left' : 'fa-arrow-right'}"></i>
                                <span>${d.buyer === company.name ? 'From: ' + d.seller : 'To: ' + d.buyer}</span>
                            </div>
                            <div style="font-weight: 900; color: var(--primary-color); font-size: 1.1rem;">${d.value}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                txContainer.innerHTML = '<p class="text-secondary" style="padding: 2rem; border: 1px dashed var(--border-color); border-radius: 12px; text-align: center;">No recorded deals on the platform.</p>';
            }

            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('profile-content').style.display = 'block';
        }
    </script>
</body>

</html>
