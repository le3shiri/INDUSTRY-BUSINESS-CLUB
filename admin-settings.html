<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence Admin | Rôles & Permissions</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/components.js"></script>
    <script src="js/admin-data.js"></script>

    <style>
        :root {
            --admin-bg: #fcfcfd;
            --card-border: #eaecf0;
            --text-main: #101828;
            --text-sub: #475467;
            --primary-corporate: #101828;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --success-bg: #ecfdf3;
            --success-text: #027a48;
            --error-bg: #fef3f2;
            --error-text: #b42318;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--admin-bg);
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .main-content {
            padding: 0;
            background: var(--admin-bg);
        }

        .top-nav {
            background: white;
            border-bottom: 1px solid var(--card-border);
            padding: 1.25rem 2.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-container {
            padding: 2rem 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Grid Layout */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        /* Sector Styling */
        .section-box {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.05);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Roles List */
        .role-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .role-item {
            padding: 1rem;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-item:hover,
        .role-item.active {
            border-color: var(--primary-corporate);
            background: #f9fafb;
        }

        .role-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .role-meta {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* Permissions Table */
        .permission-table {
            width: 100%;
            border-collapse: collapse;
        }

        .permission-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            border-bottom: 1px solid var(--card-border);
        }

        .permission-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            vertical-align: middle;
        }

        .module-group {
            background: #f9fafb;
            font-weight: 800;
            font-size: 0.75rem;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        /* Status Toggle */
        .toggle-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-granted {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-denied {
            background: var(--error-bg);
            color: var(--error-text);
        }

        /* Actions Shell */
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon-min {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            cursor: pointer;
            background: white;
        }

        .btn-icon-min:hover {
            color: var(--text-main);
            border-color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h1 style="margin:0; font-size: 1.5rem; font-weight: 700;">Permissions & Rôles</h1>
                    <p style="margin:0; font-size: 0.85rem; color: var(--text-sub);">Architecture des accès et
                        gouvernance de la plateforme</p>
                </div>
            </header>

            <div class="dashboard-container">
                <div class="settings-grid">
                    <!-- 1. GESTION DES RÔLES -->
                    <div class="section-box">
                        <div class="section-title">Rôles Définis</div>

                        <button class="btn btn-secondary"
                            style="width: 100%; margin-bottom: 1.5rem; justify-content: center; border-style: dashed; border-width: 2px;">
                            <i class="fas fa-plus-circle"></i> Créer Nouveau Rôle
                        </button>

                        <div class="role-list" id="roles-container">
                            <!-- Injected via JS -->
                        </div>
                    </div>

                    <!-- 2. CONFIGURATION DES PERMISSIONS -->
                    <div class="section-box">
                        <div class="section-title">
                            <span id="active-role-title">Configuration: Super Admin</span>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn btn-secondary"
                                    style="font-size: 0.75rem; padding: 4px 12px;">Exporter</button>
                                <button class="btn btn-primary"
                                    style="font-size: 0.75rem; padding: 4px 12px;">Sauvegarder</button>
                            </div>
                        </div>

                        <div class="table-outer">
                            <table class="permission-table">
                                <thead>
                                    <tr>
                                        <th>Module / Permission</th>
                                        <th>Accès</th>
                                        <th style="text-align: right;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="permissions-tbody">
                                    <!-- Injected -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Components.renderAdminSidebar('admin-settings.html');

            const roles = [
                { id: 'ROL-01', name: 'Super Admin', desc: 'Accès total sans aucune restriction plateforme.', users: 2, created: '01/01/2026' },
                { id: 'ROL-02', name: 'Administrateur', desc: 'Gestion opérationnelle complète sauf réglages financiers critiques.', users: 5, created: '02/01/2026' },
                { id: 'ROL-03', name: 'Modérateur', desc: 'Surveillance des contenus et résolution des litiges.', users: 12, created: '05/01/2026' },
                { id: 'ROL-04', name: 'Support Client', desc: 'Accès tickets et consultation profils utilisateurs.', users: 24, created: '10/01/2026' },
                { id: 'ROL-05', name: 'Finance / Comptabilité', desc: 'Gestion des paiements, factures et reversements.', users: 4, created: '15/01/2026' },
                { id: 'ROL-06', name: 'Vérification KYC', desc: 'Validation exclusive des documents d\'identité (KYB/KYC).', users: 8, created: '18/01/2026' },
                { id: 'ROL-07', name: 'Gestion Catalogue', desc: 'Validation et organisation des annonces de stocks.', users: 15, created: '20/01/2026' }
            ];

            const modules = [
                { name: 'Utilisateurs', perms: ['Voir utilisateurs', 'Modifier utilisateurs', 'Suspendre utilisateurs', 'Supprimer utilisateurs'] },
                { name: 'Entreprises', perms: ['Voir entreprises', 'Vérifier entreprises', 'Modifier entreprises', 'Suspendre entreprises'] },
                { name: 'Annonces / Stocks', perms: ['Voir annonces', 'Valider annonces', 'Refuser annonces', 'Supprimer annonces'] },
                { name: 'Transactions', perms: ['Voir transactions', 'Annuler transactions', 'Gérer litiges'] },
                { name: 'Paiements', perms: ['Voir paiements', 'Valider paiements', 'Lancer reversements'] },
                { name: 'KYC / KYB', perms: ['Voir documents KYC', 'Approuver KYC', 'Refuser KYC'] },
                { name: 'Support', perms: ['Voir tickets', 'Répondre tickets', 'Fermer tickets'] },
                { name: 'Paramètres', perms: ['Modifier paramètres plateforme', 'Modifier commissions', 'Gérer moyens de paiement'] }
            ];

            const rolesContainer = document.getElementById('roles-container');
            const permTable = document.getElementById('permissions-tbody');

            // Render Roles
            rolesContainer.innerHTML = roles.map((r, i) => `
                <div class="role-item ${i === 0 ? 'active' : ''}" onclick="selectRole('${r.name}', this)">
                    <div>
                        <div class="role-name">${r.name}</div>
                        <div class="role-meta">${r.users} utilisateurs • Créé le ${r.created}</div>
                    </div>
                    <div class="action-btns">
                        <div class="btn-icon-min" title="Modifier rôle"><i class="fas fa-edit"></i></div>
                        <div class="btn-icon-min" title="Assigner utilisateurs"><i class="fas fa-user-plus"></i></div>
                        <div class="btn-icon-min" style="color: #b42318" title="Supprimer rôle"><i class="fas fa-trash-alt"></i></div>
                    </div>
                </div>
            `).join('');

            // Function to render Permissions
            window.selectRole = (roleName, el) => {
                document.querySelectorAll('.role-item').forEach(item => item.classList.remove('active'));
                if (el) el.classList.add('active');
                document.getElementById('active-role-title').textContent = `Configuration: ${roleName}`;

                let html = '';
                modules.forEach(m => {
                    html += `<tr><td colspan="3" class="module-group">${m.name.toUpperCase()}</td></tr>`;
                    m.perms.forEach(p => {
                        const isGranted = (roleName === 'Super Admin' || Math.random() > 0.3);
                        html += `
                            <tr>
                                <td style="font-weight: 600; font-size: 0.85rem; padding-left: 1.5rem;">${p}</td>
                                <td>
                                    <div class="toggle-status ${isGranted ? 'status-granted' : 'status-denied'}">
                                        <i class="fas ${isGranted ? 'fa-check' : 'fa-times'}"></i> 
                                        ${isGranted ? 'AUTORISÉ' : 'REFUSÉ'}
                                    </div>
                                </td>
                                <td style="text-align: right;">
                                    <div class="action-btns" style="justify-content: flex-end;">
                                        <div class="btn-icon-min"><i class="fas fa-cog"></i></div>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                });
                permTable.innerHTML = html;
            };

            // Init call
            selectRole('Super Admin');
        });
    </script>
</body>

</html>
