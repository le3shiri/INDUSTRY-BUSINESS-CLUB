<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence Admin | Offres Refusées</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/components.js"></script>
    <script src="js/admin-data.js"></script>

    <style>
        :root {
            --admin-bg: #fcfcfd;
            --card-border: #eaecf0;
            --text-main: #101828;
            --text-sub: #475467;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --primary-corporate: #101828;
            --success-main: #027a48;
            --success-bg: #ecfdf3;
            --warning-main: #b54708;
            --warning-bg: #fffaeb;
            --danger-main: #b42318;
            --danger-bg: #fef3f2;
            --info-main: #026aa2;
            --info-bg: #f0f9ff;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--admin-bg);
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .main-content {
            padding: 0;
            background: var(--admin-bg);
        }

        .top-nav {
            background: white;
            border-bottom: 1px solid var(--card-border);
            padding: 1.25rem 2.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-container {
            padding: 2.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Filter Section */
        .filter-bar {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr) auto;
            gap: 1rem;
            align-items: flex-end;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.05);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .filter-control {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text-main);
            background: #fff;
        }

        /* High-Density Data Table */
        .table-outer {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.05);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }

        .admin-table th {
            background: #f9fafb;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--card-border);
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.85rem;
            vertical-align: middle;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger-main);
        }

        .action-btns {
            display: flex;
            gap: 0.4rem;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: white;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-icon:hover {
            border-color: var(--text-main);
            color: var(--text-main);
            background: #f9fafb;
        }

        .reason-box {
            background: #fdf2f2;
            border: 1px solid #fecdca;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.75rem;
            color: #b42318;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            gap: 6px;
            align-items: flex-start;
        }

        .id-badge {
            font-family: monospace;
            font-size: 0.7rem;
            background: #f2f4f7;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h1 style="margin:0; font-size: 1.5rem; font-weight: 700;">Offres Refusées</h1>
                    <p style="margin:0; font-size: 0.85rem; color: var(--text-sub);">Analyse des échecs de négociation
                        et audit des motifs de rejet marchands</p>
                </div>
                <div style="display: flex; gap: 0.75rem;">
                    <button class="btn btn-secondary" style="background: white;"><i class="fas fa-file-export"></i>
                        Exporter Rejets</button>
                    <button class="btn btn-primary"><i class="fas fa-sync"></i> Rafraîchir</button>
                </div>
            </header>

            <div class="dashboard-container">

                <!-- Filters -->
                <div class="filter-bar">
                    <div class="filter-group">
                        <label class="filter-label">Recherche</label>
                        <input type="text" class="filter-control" placeholder="ID Offre, Acteur, Produit...">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Acheteur</label>
                        <select class="filter-control">
                            <option selected>Tous les acheteurs</option>
                            <option>Sara Benani</option>
                            <option>Karim Mansour</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Catégorie</label>
                        <select class="filter-control">
                            <option selected>Toutes catégories</option>
                            <option>Matières Premières</option>
                            <option>Machines Industrielles</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Période</label>
                        <select class="filter-control">
                            <option selected>Derniers 30 jours</option>
                            <option>Mois précédent</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" style="padding: 10px 20px;"><i class="fas fa-filter"></i>
                        Filtrer</button>
                </div>

                <!-- High-Density Table -->
                <div class="table-outer">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>IDs (Offre/Post)</th>
                                <th>Désignation & Catégorie</th>
                                <th>Binôme (A/V)</th>
                                <th>Offre (Qté/Prix)</th>
                                <th>Volume Proposé</th>
                                <th>Timeline (Envoi/Refus)</th>
                                <th>Motif du Refus</th>
                                <th style="text-align: right;">Actions Régie</th>
                            </tr>
                        </thead>
                        <tbody id="refused-offers-body">
                            <!-- Data injection -->
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Components.renderAdminSidebar('admin-offers-refused.html');

            const refusedOffers = [
                {
                    id: 'OFF-7702', postId: 'ADS-9740', product: 'Acier Allié (Poutrelles)', category: 'Matières P.',
                    buyer: 'Karim Mansour', buyerCompany: 'Mansour Steel',
                    seller: 'Samir El Masri', sellerCompany: 'Egyptian Steel',
                    qty: 100, unit: 'poutres', price: 4200, total: 420000,
                    dateSent: '28/02/2026', dateRefused: '01/03/2026',
                    reason: 'Prix proposé trop bas par rapport au cours actuel du marché.'
                },
                {
                    id: 'OFF-7685', postId: 'ADS-9510', product: 'Pompes Centrifuges H8', category: 'Machines',
                    buyer: 'Sara Benani', buyerCompany: 'Benani Logistics',
                    seller: 'Yassin Benani', sellerCompany: 'Benani Systems',
                    qty: 5, unit: 'unités', price: 7800, total: 39000,
                    dateSent: '24/02/2026', dateRefused: '25/02/2026',
                    reason: 'Stock épuisé, nouveau réapprovisionnement prévu sous 3 semaines.'
                },
                {
                    id: 'OFF-7650', postId: 'ADS-9912', product: 'Charbon Industriel Grade A', category: 'Matières P.',
                    buyer: 'Youssef El Fassi', buyerCompany: 'Fassi Industrial',
                    seller: 'Ahmed Mansouri', sellerCompany: 'Atlas Mining',
                    qty: 300, unit: 'tonnes', price: 1050, total: 315000,
                    dateSent: '20/02/2026', dateRefused: '21/02/2026',
                    reason: 'Quantité demandée supérieure au stock disponible pour export immédiat.'
                }
            ];

            const tbody = document.getElementById('refused-offers-body');

            function renderRefused(list) {
                tbody.innerHTML = list.map(o => `
                    <tr>
                        <td>
                            <div class="id-badge">OFF: ${o.id}</div>
                            <div class="id-badge" style="margin-top:4px; opacity:0.7">ADS: ${o.postId}</div>
                        </td>
                        <td>
                            <div style="font-weight: 700;">${o.product}</div>
                            <div style="font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; font-weight: 800;">${o.category}</div>
                        </td>
                        <td>
                            <div style="font-weight: 700; font-size: 0.85rem;">A: ${o.buyerCompany}</div>
                            <div style="font-size: 0.75rem; color: var(--text-sub);">V: ${o.sellerCompany}</div>
                        </td>
                        <td>
                            <div style="font-weight: 800;">${o.qty} ${o.unit}</div>
                            <div style="font-size: 0.7rem; color: var(--text-sub);">Tentative à ${o.price.toLocaleString()} MAD</div>
                        </td>
                        <td style="font-weight: 800; color: var(--text-main);">${o.total.toLocaleString()} MAD</td>
                        <td>
                            <div style="font-size: 0.7rem;">Envoi: <b>${o.dateSent}</b></div>
                            <div style="font-size: 0.7rem; color: var(--danger-main);">Refus: ${o.dateRefused}</div>
                        </td>
                        <td>
                            <div class="reason-box">
                                <i class="fas fa-info-circle"></i>
                                <span>${o.reason}</span>
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <div class="action-btns" style="justify-content: flex-end;">
                                <button class="btn-icon" title="Voir offre"><i class="fas fa-eye"></i></button>
                                <button class="btn-icon" title="Voir produit"><i class="fas fa-box"></i></button>
                                <button class="btn-icon" title="Audit Acteurs"><i class="fas fa-search-plus"></i></button>
                                <button class="btn-icon" title="Profil Vendeur"><i class="fas fa-store-slash"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            renderRefused(refusedOffers);
        });
    </script>
</body>

</html>
