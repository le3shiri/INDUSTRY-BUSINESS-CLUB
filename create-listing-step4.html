<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxence - Price</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/wizard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/components.js"></script>
</head>

<body>

    <div class="layout-dashboard">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between;">
                <h1 style="font-size: 1.75rem; font-weight: 800; margin: 0;">Create New Listing</h1>
                <a href="dashboard.html" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">
                    <i class="fas fa-times" style="margin-right: 0.5rem;"></i> Cancel
                </a>
            </header>

            <div class="wizard-container fade-in-up">

                <div class="wizard-progress">
                    <div class="wizard-bar-bg">
                        <div class="wizard-bar-fill" style="width: 100%;"></div>
                    </div>
                    <div class="wizard-steps">
                        <div class="step-item completed">
                            <div class="step-indicator-circle">✓</div>
                            <span class="step-label">Details</span>
                        </div>
                        <div class="step-item completed">
                            <div class="step-indicator-circle">✓</div>
                            <span class="step-label">Photos</span>
                        </div>
                        <div class="step-item completed">
                            <div class="step-indicator-circle">✓</div>
                            <span class="step-label">Specs</span>
                        </div>
                        <div class="step-item active">
                            <div class="step-indicator-circle">4</div>
                            <span class="step-label">Price</span>
                        </div>
                    </div>
                </div>

                <div class="shadow-box" style="padding: 2.5rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; color: var(--primary-color);">
                        4. Financement & Déclaration</h2>

                    <!-- SECTION 6 : Conditions commerciales -->
                    <div
                        style="background: #faf5ff; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid #a855f7;">
                        <h3 style="font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: #7e22ce;">Section 6:
                            Conditions Commerciales</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label class="form-label">Conditions de paiement acceptées *</label>
                                <select id="payment_terms" class="form-input">
                                    <option value="Virement">Virement Bancaire</option>
                                    <option value="Lettre de Crédit">Lettre de Crédit (L/C)</option>
                                    <option value="Chèque">Chèque certifié</option>
                                    <option value="Espèces">Espèces (limite légale)</option>
                                    <option value="Escrow">Paiement via Escrow Fluxence</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Délai de validité de l’offre *</label>
                                <input type="text" id="offer_validity" class="form-input"
                                    placeholder="Ex: 15 jours, 1 mois...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Garantie (si applicable)</label>
                                <input type="text" id="warranty" class="form-input"
                                    placeholder="Ex: 6 mois pièces, constructeur...">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Retour accepté ?</label>
                                <select id="returns_accepted" class="form-input">
                                    <option value="Non">Non</option>
                                    <option value="Oui">Oui (sous conditions)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 7 : Déclaration -->
                    <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem;">Section 7: Déclaration &
                        Engagement</h3>
                    <div
                        style="background: var(--white); border: 1.5px solid var(--border-color); padding: 1.5rem; border-radius: 8px;">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label class="checkbox-themed"
                                style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; cursor: pointer;">
                                <input type="checkbox" id="certify_accurate" required> Je certifie que les informations
                                sont exactes
                            </label>
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label class="checkbox-themed"
                                style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; cursor: pointer;">
                                <input type="checkbox" id="stock_availability" required> Je dispose du stock mentionné
                            </label>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="checkbox-themed"
                                style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; cursor: pointer;">
                                <input type="checkbox" id="accept_terms" required> J’accepte les conditions de la
                                plateforme
                            </label>
                        </div>
                    </div>

                    <div class="mt-6"
                        style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                        <a href="create-listing-step3.html" class="btn btn-secondary" style="width: auto;">
                            <i class="fas fa-arrow-left"></i> Retour
                        </a>
                        <button class="btn btn-primary" id="review-btn"
                            style="width: auto; min-width: 180px; background: var(--primary-gradient);">
                            Réviser & Publier <i class="fas fa-check" style="margin-left: 0.5rem;"></i>
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="dashboard-overlay"></div>

    <!-- Validation Modal -->
    <div id="validation-modal" class="modal-centered">
        <div class="modal-header">
            <h2 class="modal-title">Confirm Listing</h2>
            <button class="icon-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></button>
        </div>

        <div class="modal-section">
            <h4 class="modal-section-title">Summary</h4>
            <div
                style="background: #f8fafc; padding: 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                <p><strong>Title:</strong> <span id="summary-title"></span></p>
                <p><strong>Category:</strong> <span id="summary-category"></span></p>
                <p><strong>Condition:</strong> <span id="summary-condition"></span></p>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 0.5rem 0;">
                <p><strong>Total Quantity:</strong> <span id="summary-qty"></span></p>
                <p><strong>Min Order:</strong> <span id="summary-min-qty"></span></p>
                <p><strong>Price:</strong> <span id="summary-price"
                        style="color: var(--primary-color); font-weight: 700;"></span></p>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeOverlay()">Edit</button>
            <button class="btn btn-primary" id="final-publish-btn" onclick="submitFinal()">Confirm & Publish</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // AI Button Logic
        document.getElementById('ai-btn').addEventListener('click', () => {
            const btn = document.getElementById('ai-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-magic"></i> Get AI Price Suggestion';
                document.getElementById('ai-result').style.display = 'block';
            }, 1500);
        });

        // Review Logic
        document.getElementById('review-btn').addEventListener('click', () => {
            const step4Data = {
                payment_terms: document.getElementById('payment_terms').value,
                offer_validity: document.getElementById('offer_validity').value,
                warranty: document.getElementById('warranty').value,
                returns_accepted: document.getElementById('returns_accepted').value,
                certify_accurate: document.getElementById('certify_accurate').checked,
                stock_availability: document.getElementById('stock_availability').checked,
                accept_terms: document.getElementById('accept_terms').checked
            };

            if (step4Data.certify_accurate && step4Data.stock_availability && step4Data.accept_terms) {
                // Load Data
                const listing = JSON.parse(localStorage.getItem('temp_listing') || '{}');
                const step1 = listing.step1 || {};
                const step2 = listing.step2 || {};

                // Save step 4
                listing.step4 = step4Data;
                localStorage.setItem('temp_listing', JSON.stringify(listing));

                // Populate Modal
                document.getElementById('summary-title').innerText = step1.title || 'N/A';
                document.getElementById('summary-category').innerText = step1.category || 'N/A';
                document.getElementById('summary-condition').innerText = step2.condition || 'N/A';

                document.getElementById('summary-qty').innerText = `${step2.quantity} ${step2.unit}`;
                document.getElementById('summary-min-qty').innerText = `${step2.moq} ${step2.unit}`;
                document.getElementById('summary-price').innerText = `${step2.price} MAD`;

                // Show Modal
                document.getElementById('dashboard-overlay').classList.add('active');
                const modal = document.getElementById('validation-modal');
                modal.style.opacity = '1';
                modal.style.pointerEvents = 'auto';
                modal.style.transform = 'translate(-50%, -50%)';
            } else {
                alert("Veuillez accepter toutes les déclarations de la Section 7.");
            }
        });

        function closeOverlay() {
            document.getElementById('dashboard-overlay').classList.remove('active');
            const modal = document.getElementById('validation-modal');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            modal.style.transform = 'translate(-50%, -40%)';
        }

        function submitFinal() {
            const btn = document.getElementById('final-publish-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publishing...';

            setTimeout(() => {
                // alert("Listing Published Successfully!");
                localStorage.removeItem('temp_listing'); // Clear draft
                window.location.href = 'dashboard.html';
            }, 2000);
        }
    </script>
</body>

</html>
